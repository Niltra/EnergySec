spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

app:
  jwt:
    private-key-file: classpath:dummy_key
    public-key-file: classpath:dummy_key
  ml-engine:
    url: http://localhost:8000
    api-key-file: classpath:dummy_key
