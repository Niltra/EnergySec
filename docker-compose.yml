version: '3.8'

services:
  backend-core:
    build:
      context: ./backend-core
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/energysec
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=SecureP@ssw0rd!
      - ML_ENGINE_URL=http://ml-engine:8000
      - ML_ENGINE_API_KEY_FILE=/run/secrets/ml_api_key
      - JWT_PRIVATE_KEY_FILE=/run/secrets/jwt_private_key
      - JWT_PUBLIC_KEY_FILE=/run/secrets/jwt_public_key
    depends_on:
      postgres:
        condition: service_healthy
      ml-engine:
        condition: service_healthy
    networks:
      - api-gateway-net
      - backend-db-net
    secrets:
      - db_user
      - db_password
      - ml_api_key
      - jwt_private_key
      - jwt_public_key
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1024M

  ml-engine:
    build:
      context: ./ml-engine
      dockerfile: Dockerfile
    environment:
      - API_KEY_FILE=/run/secrets/ml_api_key
    volumes:
      - ./ml-engine/model:/app/model
    networks:
      - api-gateway-net
    secrets:
      - ml_api_key
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER_FILE=/run/secrets/db_user
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_DB=energysec
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-db-net
    secrets:
      - db_user
      - db_password
    user: "postgres"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - api-gateway-net
    depends_on:
      - backend-core

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - api-gateway-net
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

networks:
  api-gateway-net:
  backend-db-net:
    internal: true

volumes:
  pgdata:

secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
  ml_api_key:
    file: ./secrets/ml_api_key.txt
  jwt_private_key:
    file: ./secrets/jwt_private_key.pem
  jwt_public_key:
    file: ./secrets/jwt_public_key.pem
